version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the envset binary
    cmds:
      - go build -o envset .
    sources:
      - "*.go"
      - go.mod
      - go.sum
    generates:
      - envset

  test:
    desc: Run tests
    cmds:
      - go test ./... -v

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run vet and tests
    cmds:
      - task: vet
      - task: test

  install:
    desc: Build and install to /usr/local/bin
    cmds:
      - go build -o envset .
      - sudo mv envset /usr/local/bin/envset

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f envset
